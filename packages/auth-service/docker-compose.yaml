version: '3.8'
services:
  user-service:
    image: your-image
    ports:
      - "3002:3002"
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tingwu
      POSTGRES_PASSWORD: tingwu_dev_password
      POSTGRES_DB: tingwu_db
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"