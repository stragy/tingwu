##############################################################
# 听悟中考AI听说训练系统 — API Gateway (Nginx)
# 统一入口：80 端口，按路径前缀路由到6个后端微服务
##############################################################

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 日志格式 ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ut="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50M;  # 允许上传音频文件

    # ── Gzip 压缩 ─────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # ── 安全头 ───────────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── 限流区（防暴力攻击） ──────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # ── 上游服务定义 ──────────────────────────────────────────
    upstream auth_service {
        server auth-service:3001;
        keepalive 16;
    }

    upstream user_service {
        server user-service:3002;
        keepalive 16;
    }

    upstream practice_service {
        server practice-service:3003;
        keepalive 16;
    }

    upstream evaluation_service {
        server evaluation-service:3004;
        keepalive 16;
    }

    upstream scheduling_service {
        server scheduling-service:3005;
        keepalive 16;
    }

    upstream analytics_service {
        server analytics-service:3006;
        keepalive 16;
    }

    # ── 主服务器块 ────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # 统一代理头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # 超时设置（音频上传需要较长时间）
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # ── 网关健康检查 ──────────────────────────────────────
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # ── 认证服务（登录/注册限流严格） ─────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://auth_service;
        }

        # ── Android 客户端认证（无 /api/v1/ 前缀，短信验证码登录） ─
        location /auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://auth_service;
        }

        # ── 推送通知设备注册（Android FCM token 管理） ──────────
        location /notification/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://auth_service;
        }

        # ── 用户服务 ──────────────────────────────────────────
        location /api/v1/users/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://user_service;
        }

        # ── 练习题库接口（Android 客户端直接调用） ──────────
        location /exercises {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://practice_service;
        }

        # ── 练习服务（含音频上传，超时放宽到 120s） ──────────
        location /api/v1/practice/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://practice_service;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            client_max_body_size 100M;
        }

        # ── 评测接口（Android 客户端直接调用） ───────────────
        location /evaluations {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://evaluation_service;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
            client_max_body_size 100M;
        }

        # ── 评估服务（AI推理可能较慢，超时放宽到 180s） ──────
        location /api/v1/evaluation/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://evaluation_service;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        # ── 排课服务 ──────────────────────────────────────────
        location /api/v1/schedules/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://scheduling_service;
        }

        # ── 分析服务 ──────────────────────────────────────────
        location /api/v1/analytics/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://analytics_service;
        }

        # ── 各服务健康检查透传 ────────────────────────────────
        location = /services/auth/health {
            proxy_pass http://auth_service/health;
        }
        location = /services/user/health {
            proxy_pass http://user_service/health;
        }
        location = /services/practice/health {
            proxy_pass http://practice_service/health;
        }
        location = /services/evaluation/health {
            proxy_pass http://evaluation_service/health;
        }
        location = /services/scheduling/health {
            proxy_pass http://scheduling_service/health;
        }
        location = /services/analytics/health {
            proxy_pass http://analytics_service/health;
        }

        # ── 404 fallback ──────────────────────────────────────
        location / {
            return 404 '{"error":"Route not found"}';
            add_header Content-Type application/json;
        }
    }
}
